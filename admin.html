<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Brookdale Diner — Payment Setup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Playfair+Display+SC:wght@700;900&family=Karla:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FFF8F0; --white:#fff;
  --red:#DC2626; --red-deep:#B91C1C;
  --black:#0A0A0A; --ink:#1f1a18; --grey:#6b6360; --line:#e5dfd6;
  --zelle:#6b21a8; --venmo:#3d95ce; --cashapp:#00a827;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Karla',system-ui,sans-serif;color:var(--ink);background:var(--bg);min-height:100vh;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}
input{font-family:inherit}

/* ── LOCK ── */
#lock{
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:32px 20px;text-align:center;background:var(--black);
}
#lock .logo{font-family:'Abril Fatface',serif;font-size:38px;color:var(--red);margin-bottom:4px}
#lock .sub{font-family:'Playfair Display SC',serif;font-weight:700;font-size:10px;letter-spacing:4px;color:#555;text-transform:uppercase;margin-bottom:32px}
#lock .card{background:var(--white);border-radius:18px;padding:32px 28px;width:100%;max-width:340px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
#lock .card h2{font-family:'Playfair Display SC',serif;font-weight:900;font-size:16px;letter-spacing:2px;margin-bottom:18px}
#lock input{width:100%;padding:14px;border:2px solid var(--line);border-radius:10px;font-size:22px;letter-spacing:8px;text-align:center;color:var(--ink);background:var(--bg);transition:border-color .2s;margin-bottom:12px}
#lock input:focus{outline:none;border-color:var(--red)}
#lock .btn{width:100%;padding:14px;background:var(--red);color:#fff;border:none;border-radius:10px;font-family:'Playfair Display SC',serif;font-weight:700;font-size:14px;letter-spacing:3px;text-transform:uppercase;transition:background .2s}
#lock .btn:hover{background:var(--red-deep)}
#lock .err{color:var(--red);font-size:13px;font-weight:700;margin-top:10px;display:none}

/* ── ADMIN ── */
#admin{display:none;max-width:500px;margin:0 auto;padding:36px 22px 60px}

.admin-logo{text-align:center;margin-bottom:28px}
.admin-logo .name{font-family:'Abril Fatface',serif;font-size:28px;color:var(--red)}
.admin-logo .tag{font-family:'Playfair Display SC',serif;font-weight:700;font-size:10px;letter-spacing:4px;color:var(--grey);text-transform:uppercase;margin-top:2px}

.section-head{font-family:'Playfair Display SC',serif;font-weight:700;font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--red);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.section-head::after{content:'';height:1px;background:var(--line);flex:1}

.handle-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;background:var(--white);border:2px solid var(--line);border-radius:12px;padding:14px 16px;transition:border-color .2s}
.handle-row:focus-within{border-color:var(--red)}
.handle-row.z{border-left:4px solid var(--zelle)}
.handle-row.v{border-left:4px solid var(--venmo)}
.handle-row.c{border-left:4px solid var(--cashapp)}

.handle-icon{width:40px;height:40px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display SC',serif;font-weight:900;font-size:16px;color:#fff}
.hi-z{background:var(--zelle)}
.hi-v{background:var(--venmo)}
.hi-c{background:var(--cashapp)}

.handle-field{flex:1}
.handle-field label{display:block;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--grey);margin-bottom:3px}
.handle-field input{width:100%;border:none;background:none;font-size:16px;font-weight:700;color:var(--ink);padding:0}
.handle-field input:focus{outline:none}
.handle-field input::placeholder{color:#ccc;font-weight:400}

.gen-btn{width:100%;padding:17px;background:var(--red);color:#fff;border:none;border-radius:12px;font-family:'Playfair Display SC',serif;font-weight:700;font-size:15px;letter-spacing:3px;text-transform:uppercase;transition:background .2s,transform .1s;margin-top:4px}
.gen-btn:hover{background:var(--red-deep)}
.gen-btn:active{transform:scale(.98)}

/* ── QR CARD ── */
#output{display:none;margin-top:32px}

.qr-card{background:var(--white);border:3px solid var(--black);border-radius:18px;overflow:hidden;text-align:center}
.qr-card .top{background:var(--black);padding:14px 16px}
.qr-card .top .dn{font-family:'Abril Fatface',serif;font-size:22px;color:var(--red)}
.qr-card .top .ds{font-family:'Playfair Display SC',serif;font-weight:700;font-size:8px;letter-spacing:3px;color:#888;text-transform:uppercase;margin-top:2px}

.qr-card .mid{padding:20px 16px 14px;display:flex;flex-direction:column;align-items:center;gap:10px}
.qr-card .scan-lbl{font-family:'Playfair Display SC',serif;font-weight:700;font-size:9px;letter-spacing:5px;text-transform:uppercase;color:var(--grey)}
.qr-card .qr-box{padding:8px;border:2px solid var(--line);border-radius:10px;display:inline-flex}
.qr-card .qr-box canvas,.qr-card .qr-box img{display:block;width:200px!important;height:200px!important}

.qr-card .handles{width:100%;border-top:2px solid var(--line);display:grid;grid-template-columns:repeat(3,1fr)}
.qr-card .h-col{padding:14px 8px;text-align:center;border-right:1px solid var(--line)}
.qr-card .h-col:last-child{border-right:none}
.qr-card .h-label{font-family:'Playfair Display SC',serif;font-weight:700;font-size:9px;letter-spacing:2px;text-transform:uppercase;margin-bottom:5px}
.qr-card .h-label.z{color:var(--zelle)}
.qr-card .h-label.v{color:var(--venmo)}
.qr-card .h-label.c{color:var(--cashapp)}
.qr-card .h-val{font-size:13px;font-weight:700;color:var(--ink);word-break:break-all;line-height:1.3}
.qr-card .h-val.none{color:#ccc;font-style:italic;font-weight:400;font-size:11px}

.qr-card .bot{background:var(--red);padding:10px 16px;text-align:center}
.qr-card .bot p{font-size:11px;color:rgba(255,255,255,.85);font-weight:700;letter-spacing:1px}

.print-btn{width:100%;padding:17px;background:var(--black);color:#fff;border:none;border-radius:12px;font-family:'Playfair Display SC',serif;font-weight:700;font-size:15px;letter-spacing:3px;text-transform:uppercase;transition:background .2s;margin-top:14px}
.print-btn:hover{background:#333}

/* ── PRINT ── */
@media print{
  #lock,#admin>.admin-logo,.section-head,.handle-row,.gen-btn,.print-btn{display:none!important}
  #admin{display:block!important;max-width:100%;padding:0}
  #output{display:block!important}
  .qr-card{max-width:360px;margin:0 auto;border-width:2px}
  body{background:#fff}
  @page{size:letter;margin:.5in}
}
</style>
</head>
<body>

<!-- LOCK -->
<div id="lock">
  <div class="logo">Brookdale Diner</div>
  <div class="sub">Staff Access Only</div>
  <div class="card">
    <h2>Enter Passcode</h2>
    <input type="password" id="pc" placeholder="••••••••" maxlength="12"
           autocomplete="off" onkeydown="if(event.key==='Enter')unlock()"/>
    <button class="btn" onclick="unlock()">Unlock</button>
    <div class="err" id="err">Wrong passcode — try again</div>
  </div>
</div>

<!-- ADMIN -->
<div id="admin">

  <div class="admin-logo">
    <div class="name">Brookdale Diner</div>
    <div class="tag">Payment Card Setup</div>
  </div>

  <div class="section-head">Your Payment Handles</div>

  <div class="handle-row z">
    <div class="handle-icon hi-z">Z</div>
    <div class="handle-field">
      <label>Zelle — Phone or Email</label>
      <input type="text" id="f-z" placeholder="e.g. (650) 575-3234"/>
    </div>
  </div>

  <div class="handle-row v">
    <div class="handle-icon hi-v">V</div>
    <div class="handle-field">
      <label>Venmo — @username</label>
      <input type="text" id="f-v" placeholder="e.g. JrAlvarez  (no @ needed)"/>
    </div>
  </div>

  <div class="handle-row c">
    <div class="handle-icon hi-c">$</div>
    <div class="handle-field">
      <label>Cash App — $cashtag</label>
      <input type="text" id="f-c" placeholder="e.g. JrAlvarez  (no $ needed)"/>
    </div>
  </div>

  <button class="gen-btn" onclick="generate()">Generate Payment Card</button>

  <!-- OUTPUT -->
  <div id="output">
    <div class="qr-card">
      <div class="top">
        <div class="dn">Brookdale Diner</div>
        <div class="ds">Historic Brookdale Lodge &middot; Brookdale, CA</div>
      </div>
      <div class="mid">
        <span class="scan-lbl">Scan to Pay</span>
        <div class="qr-box" id="qr-out"></div>
      </div>
      <div class="handles">
        <div class="h-col">
          <div class="h-label z">Zelle</div>
          <div class="h-val" id="p-z">—</div>
        </div>
        <div class="h-col">
          <div class="h-label v">Venmo</div>
          <div class="h-val" id="p-v">—</div>
        </div>
        <div class="h-col">
          <div class="h-label c">Cash App</div>
          <div class="h-val" id="p-c">—</div>
        </div>
      </div>
      <div class="bot">
        <p>Scan QR · Pick your app · Send the amount Jr tells you · Done!</p>
      </div>
    </div>

    <button class="print-btn" onclick="window.print()">Print This Card</button>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
function unlock() {
  if (document.getElementById('pc').value.trim() === 'diner2890') {
    document.getElementById('lock').style.display = 'none';
    document.getElementById('admin').style.display = 'block';
  } else {
    const e = document.getElementById('err');
    e.style.display = 'block';
    document.getElementById('pc').value = '';
    setTimeout(() => e.style.display = 'none', 2500);
  }
}

function generate() {
  const z = document.getElementById('f-z').value.trim();
  const v = document.getElementById('f-v').value.trim().replace(/^@/, '');
  const c = document.getElementById('f-c').value.trim().replace(/^\$/, '');

  if (!z && !v && !c) {
    alert('Enter at least one payment handle (Zelle, Venmo, or Cash App).');
    return;
  }

  // Build pay page URL with handles as params
  const base = 'https://123maria0608-star.github.io/brookdale-diner/pay.html';
  const params = new URLSearchParams();
  if (z) params.set('z', z);
  if (v) params.set('v', v);
  if (c) params.set('c', c);
  const fullUrl = base + '?' + params.toString();

  const box = document.getElementById('qr-out');
  box.innerHTML = '';
  try {
    new QRCode(box, {
      text: fullUrl,
      width: 200, height: 200,
      colorDark: '#0A0A0A', colorLight: '#FFFFFF',
      correctLevel: QRCode.CorrectLevel.M
    });
  } catch(e) { box.textContent = fullUrl; }

  const set = (id, val, prefix) => {
    const el = document.getElementById(id);
    el.textContent = val ? prefix + val : '—';
    el.className = 'h-val' + (val ? '' : ' none');
  };
  set('p-z', z, '');
  set('p-v', v, '@');
  set('p-c', c, '$');

  document.getElementById('output').style.display = 'block';
  document.getElementById('output').scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>
</body>
</html>
